<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Healthy Plan 🥗</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animate on Scroll (AOS) -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- 3D Tilt Effect -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>

  <style>
    body {
      background: radial-gradient(circle at top left, #0f172a, #020617);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .tilt-card {
      transform-style: preserve-3d;
      transition: all 0.4s ease;
      box-shadow: 0 0 25px rgba(0, 255, 170, 0.15);
    }
    .tilt-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 255, 200, 0.35);
    }
  </style>
</head>

<body class="text-white flex flex-col items-center justify-center py-10">

  <!-- HEADER -->
  <header class="text-center mb-10" data-aos="fade-down">
    <h1 class="text-5xl font-extrabold text-emerald-400 drop-shadow-lg">🌿 My Healthy Plan</h1>
    <p class="text-gray-300 mt-3 text-lg">AI-powered health, diet & fitness recommendations for you.</p>
  </header>

  <!-- FORM SECTION -->
  <div class="tilt-card bg-gray-800/70 backdrop-blur-2xl rounded-3xl p-8 max-w-5xl w-[90%]" data-tilt data-aos="fade-up">
    <form action="/recommend" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div>
        <label class="font-semibold text-gray-200">Age</label>
        <input type="number" name="age" required class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div>
        <label class="font-semibold text-gray-200">Gender</label>
        <select name="gender" required class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
          <option value="">Select...</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label class="font-semibold text-gray-200">Weight (kg)</label>
        <input type="number" name="weight" required class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div>
        <label class="font-semibold text-gray-200">Height (m)</label>
        <input type="number" step="0.01" name="height" required class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div>
        <label class="font-semibold text-gray-200">Diet Preference</label>
        <select name="veg_or_nonveg" class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
          <option>Veg</option>
          <option>Non-Veg</option>
        </select>
      </div>

      <div>
        <label class="font-semibold text-gray-200">Disease</label>
        <input type="text" name="disease" placeholder="e.g. Diabetes" class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div>
        <label class="font-semibold text-gray-200">Region</label>
        <input type="text" name="region" placeholder="e.g. South India" class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div>
        <label class="font-semibold text-gray-200">Allergies</label>
        <input type="text" name="allergics" placeholder="e.g. Peanuts, Dairy" class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div class="md:col-span-2">
        <label class="font-semibold text-gray-200">Preferred Food Type</label>
        <input type="text" name="foodtype" placeholder="e.g. South Indian, High Protein" class="w-full mt-2 p-3 bg-gray-700 text-white border border-gray-600 rounded-xl focus:ring-2 focus:ring-emerald-400">
      </div>

      <div class="md:col-span-2 flex justify-center mt-6">
        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 transition transform hover:scale-105 px-8 py-3 text-white font-semibold text-lg rounded-xl shadow-lg shadow-emerald-500/30">
          🥗 Generate My Healthy Plan
        </button>
      </div>
    </form>
  </div>

  <!-- FOOTER -->
  <footer class="mt-10 text-gray-400 text-sm text-center" data-aos="fade-up">
    💡 Powered by AI — Designed for a Healthier You!
  </footer>

  <!-- AOS Init -->
  <script>
    AOS.init({ duration: 1000, once: true });
    VanillaTilt.init(document.querySelectorAll("[data-tilt]"), { max: 10, speed: 400 });
  </script>

</body>
</html>
